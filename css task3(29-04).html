<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Display Arrangement</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: black;
        padding: 10px;     
    }

    .container {
        max-width: 900px;
        margin:auto;
        background: gray;
        padding: 50px;
        border-radius: 10px;
    }

    h2 {
        margin-bottom: 30px;
    }

    .section {
        margin-bottom: 20px;
    }

    .section h3 {
        border-left: 5px solid blue;
        padding-left: 10px;
        margin-bottom: 5px;
    }

    .section p {
        font-size: 14px;
        color: orangered;
        margin-bottom: 15px;
    }

    img {
        width: 100px;
        height: 100px;
        border-radius: 10px;
        margin: 10px;
    }

    .block img {
        display: block;
        margin-left: auto;
        margin-right: auto; 
    }

    .flex {
        display: flex;
        gap: 70px;
        align-items: center;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 60px;

    }
</style>
</head>
<body>
<div class="container">
    <h2>Image Display Arrangement</h2>

    <div class="section">
        <h3>Images as Block (display: block)</h3>
        <p>Each image takes its own line and stacks vertically.</p>
        <div class="block">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
        </div>
    </div>

    <div class="section">
        <h3>Images in Flexbox (display: flex)</h3>
        <p>Images sit in a row and are spaced evenly.</p>
        <div class="flex">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
        </div>
    </div>

    <div class="section">
        <h3>Images in Grid (display: grid)</h3>
        <p>Organized into a 3-column structure.</p>
        <div class="grid">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
            <img src="https://cdn.britannica.com/26/148326-050-D5854FCD/match.jpg">
        </div>
    </div>
</div>
</body>
</html>
