<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>season</title>
</head>
<body>
    <script>
        let month = "Sudharshan";

switch (month) {
    case "March":
    case "April":
    case "May":
        console.log("Summer Season");
        break;

    case "June":
    case "July":
    case "August":
    case "September":
        console.log("Rainy Season");
        break;

    case "October":
    case "November":
    case "December":
    case "January":
    case "February":
        console.log("Winter Season");
        break;

    default:
        console.log("Invalid Month");
}
    </script>
</body>
</html>
